<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速註冊測試帳號</title>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(123, 47, 190, 0.3);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid rgba(123, 47, 190, 0.3);
            border-radius: 8px;
            background: rgba(26, 11, 46, 0.5);
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7b2fbe 0%, #ec4899 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            opacity: 0.9;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 快速註冊測試帳號</h1>
        <input type="text" id="username" placeholder="用戶名" value="admin">
        <input type="password" id="password" placeholder="密碼" value="admin123">
        <button onclick="register()">立即註冊</button>
        <div id="result" class="result"></div>
        <p style="margin-top: 20px; text-align: center; opacity: 0.7;">
            註冊成功後，返回主頁面登入即可！
        </p>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            try {
                const response = await fetch('http://localhost:54321/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `✅ 註冊成功！<br><br>用戶名: ${username}<br>密碼: ${password}<br><br>現在可以返回主頁面登入了！`;
                    resultDiv.style.display = 'block';
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `❌ 註冊失敗: ${data.error}`;
                    resultDiv.style.display = 'block';
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ 網絡錯誤: 無法連接後端服務<br><br>請確認後端服務已啟動於端口 54321`;
                resultDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
